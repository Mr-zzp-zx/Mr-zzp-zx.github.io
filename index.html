.msg-bubble pre { background: #F1F5F9; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }

.send-btn svg { width: 18px; height: 18px; color: #fff; }
.send-btn.loading { opacity: 1; pointer-events: none; }
.send-btn.loading svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.input-hint { text-align: center; font-size: 11px; color: var(--text-muted); padding: 8px 0 0; max-width: 800px; margin: 0 auto; }

@media (max-width: 768px) { .sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 200; box-shadow: var(--shadow-md); } .sidebar.collapsed { width: 0; } .mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 150; display: none; } .mobile-overlay.show { display: block; } .msg-content { max-width: 85%; } .welcome h2 { font-size: 22px; } .welcome p { font-size: 14px; } .input-wrapper { margin: 0 4px; } }

</style>

let isStreaming = false;
let abortController = null;
let speedMode = false;
let pendingImages = [];

document.addEventListener('DOMContentLoaded', () => {
  marked.setOptions({ breaks: true, gfm: true });
  renderHistory();
  const lastId = localStorage.getItem('zhizhen_last_conv');
  if (lastId && conversations[lastId]) { switchConversation(lastId); }
});

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('mobileOverlay');
  sb.classList.toggle('collapsed');
  if (window.innerWidth <= 768) { ov.classList.toggle('show', !sb.classList.contains('collapsed')); }
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const sorted = Object.entries(conversations).sort((a, b) => b[1].updatedAt - a[1].updatedAt);
  if (sorted.length === 0) { list.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-muted);font-size:13px;">暂无历史对话</div>'; return; }
  list.innerHTML = sorted.map(([id, c]) => `
    <div class="history-item ${id === currentConvId ? 'active' : ''}" onclick="switchConversation('${id}')">
      <div class="history-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
      <div class="history-item-text">
        <div class="history-item-title">${escapeHtml(c.title)}</div>
        <div class="history-item-time">${formatTime(c.updatedAt)}</div>
      </div>
      <button class="history-item-del" onclick="event.stopPropagation();deleteConversation('${id}')" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
    </div>
  `).join('');
}

function newConversation() {
  currentConvId = null;
  document.getElementById('welcomePage').style.display = 'flex';
  document.getElementById('messagesContainer').style.display = 'none';
  document.getElementById('messagesContainer').innerHTML = '';
  document.getElementById('topbarTitle').textContent = '新对话';
  localStorage.removeItem('zhizhen_last_conv');
  renderHistory();
  clearPendingImages();
  if (window.innerWidth <= 768) toggleSidebar();
}

function switchConversation(id) {
  if (!conversations[id]) return;
  currentConvId = id;
  localStorage.setItem('zhizhen_last_conv', id);
  document.getElementById('welcomePage').style.display = 'none';
  const mc = document.getElementById('messagesContainer');
  mc.style.display = 'block';
  mc.innerHTML = '';
  const conv = conversations[id];
  document.getElementById('topbarTitle').textContent = conv.title;
  conv.messages.forEach(m => appendMessageToDOM(m.role, m.content, m.images, m.timestamp, false));
  renderHistory();
  scrollToBottom();
  if (window.innerWidth <= 768) toggleSidebar();
}

function deleteConversation(id) {
  if (!confirm('确定删除该对话？')) return;
  delete conversations[id];
  localStorage.setItem('zhizhen_conversations', JSON.stringify(conversations));
  if (currentConvId === id) newConversation();
  else renderHistory();
}

function saveConversation() {
  if (!currentConvId) {
    currentConvId = 'conv-' + Date.now();
    const title = conversations[currentConvId]?.messages?.find(m => m.role === 'user')?.content.slice(0, 30) || '新对话';
    conversations[currentConvId] = { title, messages: [], updatedAt: Date.now(), difyConvId: '' };
  }
  localStorage.setItem('zhizhen_last_conv', currentConvId);
  conversations[currentConvId].updatedAt = Date.now();
  localStorage.setItem('zhizhen_conversations', JSON.stringify(conversations));
  renderHistory();
}

function appendMessageToDOM(role, content, images, timestamp, animate = true) {
  const mc = document.getElementById('messagesContainer');
  const row = document.createElement('div');
  row.className = `message-row ${role === 'user' ? 'user' : ''}`;
  if (!animate) row.style.animation = 'none';
  const avatarHtml = role === 'user'
    ? `<div class="msg-avatar user"><span>我</span></div>`
    : `<div class="msg-avatar ai"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2v8m0 0v8m0-8h8m-8 0H4"/></svg></div>`;
  let imgHtml = '';
  if (images && images.length > 0) {
    imgHtml = images.map(url => `<img src="${url}" onclick="showImageModal(this.src)" alt="上传图片">`).join('');
  }
  const bubbleContent = role === 'assistant' ? renderMarkdown(content) : '';
  row.innerHTML = `${avatarHtml}<div class="msg-content"><div class="msg-bubble">${imgHtml}${role === 'user' ? `<div style="white-space:pre-wrap">${escapeHtml(content)}</div>` : ''}<div class="md-content" style="${role === 'user' ? 'display:none' : ''}">${bubbleContent}</div></div><div class="msg-time">${formatTime(timestamp)}</div></div>`;
  mc.appendChild(row);
  return row;
}

function createStreamingMessage() {
  const mc = document.getElementById('messagesContainer');
  const row = document.createElement('div');
  row.className = 'message-row';
  row.id = 'streamingRow';
  row.innerHTML = `<div class="msg-avatar ai"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2v8m0 0v8m0-8h8m-8 0H4"/></svg></div><div class="msg-content"><div class="msg-bubble"><div class="md-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div><div class="msg-time">${formatTime(Date.now())}</div></div>`;
  mc.appendChild(row);
  return row;
}

function updateStreamingMessage(row, text) {
  const md = row.querySelector('.md-content');
  if (md) { md.innerHTML = renderMarkdown(text); }
  scrollToBottom();
}

function finishStreamingMessage(row, text) {
  const md = row.querySelector('.md-content');
  if (md) { md.innerHTML = renderMarkdown(text); }
  row.removeAttribute('id');
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text && pendingImages.length === 0) return;
  if (isStreaming) return;
  document.getElementById('welcomePage').style.display = 'none';
  document.getElementById('messagesContainer').style.display = 'block';
  if (!currentConvId) { saveConversation(); }
  let uploadedFileIds = [];
  let imagePreviews = [];
  if (pendingImages.length > 0) {
    showUploadOverlay(true);
    for (const img of pendingImages) {
      try {
        const fileId = await uploadFile(img.file);
        uploadedFileIds.push(fileId);
        imagePreviews.push(img.preview);
      } catch (e) { console.error('Upload failed:', e); alert('图片上传失败，请重试'); showUploadOverlay(false); return; }
    }
    showUploadOverlay(false);
  }
  appendMessageToDOM('user', text || '[图片]', imagePreviews, Date.now());
  scrollToBottom();
  conversations[currentConvId].messages.push({ role: 'user', content: text, images: imagePreviews, timestamp: Date.now() });
  if (!conversations[currentConvId].title || conversations[currentConvId].title === '新对话') {
    conversations[currentConvId].title = text.slice(0, 30) || '图片咨询';
    document.getElementById('topbarTitle').textContent = conversations[currentConvId].title;
  }
  saveConversation();
  input.value = '';
  autoResize(input);
  clearPendingImages();
  updateSendBtn();
  isStreaming = true;
  setSendBtnLoading(true);
  document.getElementById('stopBtn').classList.add('show');
  abortController = new AbortController();
  const streamRow = createStreamingMessage();
  scrollToBottom();
  try {
    const inputs = {};
    if (text) inputs.query = text;
    if (uploadedFileIds.length > 0) {
      inputs.picture = { type: 'image', transfer_method: 'local_file', upload_file_id: uploadedFileIds[0] };
      if (!text) inputs.query = '请分析这张图片';
    }
    const body = {
      query: inputs.query || text || '请分析这张图片',
      inputs: inputs,
      user: USER_ID,
      response_mode: 'streaming',
      conversation_id: conversations[currentConvId].difyConvId || ''
    };
    const response = await fetch(`${API_BASE}/v1/chat-messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify(body),
      signal: abortController.signal
    });
    if (!response.ok) { const errText = await response.text(); throw new Error(`API Error ${response.status}: ${errText}`); }
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullAnswer = '';
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const dataStr = line.slice(6).trim();
          if (!dataStr || dataStr === '[DONE]') continue;
          try {
            const data = JSON.parse(dataStr);
            if (data.answer) { fullAnswer += data.answer; updateStreamingMessage(streamRow, fullAnswer); }
            if (data.conversation_id && data.conversation_id !== conversations[currentConvId].difyConvId) { conversations[currentConvId].difyConvId = data.conversation_id; saveConversation(); }
            if (data.event === 'error') { throw new Error(data.message || 'Unknown error'); }
          } catch (e) { if (e.message.includes('API Error') || e.name === 'AbortError') throw e; console.warn('Parse error:', e); }
        }
      }
    }
    finishStreamingMessage(streamRow, fullAnswer);
    conversations[currentConvId].messages.push({ role: 'assistant', content: fullAnswer, timestamp: Date.now() });
    saveConversation();
  } catch (e) {
    if (e.name === 'AbortError') {
      const md = streamRow.querySelector('.md-content');
      const currentText = md?.textContent || '';
      if (md) md.innerHTML = renderMarkdown(currentText + '\n\n*[已停止生成]*');
      streamRow.removeAttribute('id');
      conversations[currentConvId].messages.push({ role: 'assistant', content: currentText + '\n\n*[已停止生成]*', timestamp: Date.now() });
      saveConversation();
    } else {
      console.error(e);
      const md = streamRow.querySelector('.md-content');
      if (md) md.innerHTML = `<span style="color:#EF4444">请求出错：${escapeHtml(e.message)}</span>`;
      streamRow.removeAttribute('id');
    }
  } finally { isStreaming = false; setSendBtnLoading(false); document.getElementById('stopBtn').classList.remove('show'); abortController = null; }
}

function stopGeneration() { if (abortController) abortController.abort(); }

async function uploadFile(file) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('user', USER_ID);
  const res = await fetch(`${API_BASE}/v1/files/upload`, { method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}` }, body: formData });
  if (!res.ok) throw new Error(`Upload failed: ${res.status}`);
  const data = await res.json();
  return data.id;
}

function handleFileSelect(event) {
  Array.from(event.target.files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => { pendingImages.push({ file, preview: e.target.result }); renderImagePreviews(); updateSendBtn(); };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderImagePreviews() {
  const bar = document.getElementById('imagePreviewBar');
  bar.innerHTML = pendingImages.map((img, i) => `<div class="preview-item"><img src="${img.preview}" alt="preview"><button class="preview-item-del" onclick="removePendingImage(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('');
}

function removePendingImage(index) { pendingImages.splice(index, 1); renderImagePreviews(); updateSendBtn(); }
function clearPendingImages() { pendingImages = []; renderImagePreviews(); }
function showUploadOverlay(show) { document.getElementById('uploadOverlay').classList.toggle('show', show); }
function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function updateSendBtn() { const btn = document.getElementById('sendBtn'); const input = document.getElementById('userInput'); btn.classList.toggle('active', input.value.trim() || pendingImages.length > 0); }
function setSendBtnLoading(loading) { const btn = document.getElementById('sendBtn'); btn.classList.toggle('loading', loading); if (loading) { btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M7.76 7.76L4.93 4.93"/></svg>`; } else { btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`; } }
function scrollToBottom() { const area = document.getElementById('chatArea'); requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; }); }
function toggleSpeed() { speedMode = !speedMode; document.getElementById('speedToggle').classList.toggle('active', speedMode); }
function useTag(text) { document.getElementById('userInput').value = text; autoResize(document.getElementById('userInput')); updateSendBtn(); document.getElementById('userInput').focus(); }
function showImageModal(src) { document.getElementById('imgModal').classList.add('show'); document.getElementById('imgModalImg').src = src; }
function renderMarkdown(text) { if (!text) return ''; try { return marked.parse(text); } catch (e) { return escapeHtml(text).replace(/\n/g, '<br>'); } }
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function formatTime(ts) { if (!ts) return ''; const d = new Date(ts); const now = new Date(); if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); const y = new Date(now); y.setDate(y.getDate() - 1); if (d.toDateString() === y.toDateString()) return '昨天 ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
document.addEventListener('click', (e) => { if (window.innerWidth > 768) return; const sb = document.getElementById('sidebar'); if (sb.classList.contains('collapsed')) return; if (!sb.contains(e.target) && !e.target.closest('.toggle-btn')) { toggleSidebar(); } });
</script>
</body>
